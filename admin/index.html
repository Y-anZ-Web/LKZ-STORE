<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - LKZ Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #0a0f1e; --primary-light: #111827; --surface: #131b2e;
      --border: #1e3050; --text: #e2e8f0; --text-secondary: #94a3b8;
      --text-muted: #64748b; --accent: #7ec8e3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--primary);
      color: var(--text);
      min-height: 100vh;
    }
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .login-box h1 { font-size: 22px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .login-box h1 i { color: var(--accent); }
    .login-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: var(--primary-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7ec8e3, #5a9fd4);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .login-box button:hover { opacity: 0.9; }
    .login-error { color: #f87171; font-size: 13px; margin-bottom: 12px; display: none; }
    .dashboard { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
    .dashboard.active { display: block; }
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .dash-header h1 { font-size: 22px; display: flex; align-items: center; gap: 10px; }
    .dash-header h1 i { color: var(--accent); }
    .dash-header span { color: var(--text-secondary); font-size: 14px; }
    .btn-logout {
      padding: 8px 16px; background: transparent; border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px;
    }
    .btn-logout:hover { border-color: #f87171; color: #f87171; }
    .orders-table {
      width: 100%; border-collapse: collapse; font-size: 14px;
    }
    .orders-table th {
      text-align: left; padding: 12px 16px; color: var(--text-muted);
      font-weight: 500; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase;
    }
    .orders-table td {
      padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .orders-table tr:hover td { background: rgba(126, 200, 227, 0.03); }
    .status-badge {
      padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600;
    }
    .status-pending { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .status-completed { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
    .status-cancelled { background: rgba(248, 113, 113, 0.15); color: #f87171; }
    .order-items {
      font-size: 13px; color: var(--text-secondary); list-style: none;
    }
    .order-items li { margin-bottom: 2px; }
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state i { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .stat-card .num { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-card .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .refresh-btn {
      padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .dash-top { display: flex; align-items: center; gap: 12px; }
    @media (max-width: 768px) {
      .orders-table { font-size: 12px; }
      .orders-table th, .orders-table td { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1><i class="fas fa-shield-halved"></i> Admin LKZ</h1>
      <p>Faça login para gerenciar pedidos.</p>
      <div class="login-error" id="loginError">Credenciais inválidas</div>
      <input type="text" id="adminUser" placeholder="Usuário" autocomplete="username">
      <input type="password" id="adminPass" placeholder="Senha" autocomplete="current-password">
      <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <div>
        <h1><i class="fas fa-store"></i> LKZ Shop — Admin</h1>
        <span>Gerencie os pedidos da loja</span>
      </div>
      <div class="dash-top">
        <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync"></i> Atualizar</button>
        <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <table class="orders-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>Itens</th>
          <th>Total</th>
          <th>Status</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </div>

  <script>
    const API = 'https://lkz-shop.onrender.com';
    let auth = '';

    document.getElementById('loginBtn').addEventListener('click', () => {
      const user = document.getElementById('adminUser').value;
      const pass = document.getElementById('adminPass').value;
      auth = btoa(user + ':' + pass);

      fetch(API + '/api/orders', {
        headers: { 'Authorization': 'Basic ' + auth }
      })
      .then(r => {
        if (r.status === 401) throw new Error('inválido');
        return r.json();
      })
      .then(data => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        renderOrders(data);
      })
      .catch(() => {
        document.getElementById('loginError').style.display = 'block';
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      auth = '';
      document.getElementById('dashboard').classList.remove('active');
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminUser').value = '';
      document.getElementById('adminPass').value = '';
    });

    document.getElementById('refreshBtn').addEventListener('click', loadOrders);

    function loadOrders() {
      fetch(API + '/api/orders', {
        headers: { 'Authorization': 'Basic ' + auth }
      })
      .then(r => r.json())
      .then(renderOrders);
    }

    function renderOrders(orders) {
      const tbody = document.getElementById('ordersBody');
      const stats = document.getElementById('statsRow');

      stats.innerHTML = `
        <div class="stat-card"><div class="num">${orders.length}</div><div class="label">Total Pedidos</div></div>
        <div class="stat-card"><div class="num">${orders.filter(o => o.status === 'pending').length}</div><div class="label">Pendentes</div></div>
        <div class="stat-card"><div class="num">${orders.reduce((s, o) => s + o.total_items, 0)}</div><div class="label">Itens Vendidos</div></div>
      `;

      if (!orders.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-inbox"></i><p>Nenhum pedido ainda</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = orders.map(o => `
        <tr>
          <td>#${o.id}</td>
          <td><strong>${o.username}</strong></td>
          <td><ul class="order-items">${JSON.parse(o.items).map(i => `<li>${i.name} x${i.qty}</li>`).join('')}</ul></td>
          <td>${o.total_items} itens</td>
          <td><span class="status-badge status-${o.status}">${o.status}</span></td>
          <td>${new Date(o.created_at).toLocaleString('pt-BR')}</td>
        </tr>
      `).join('');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
        document.getElementById('loginBtn').click();
      }
    });
  </script>
</body>
</html>
